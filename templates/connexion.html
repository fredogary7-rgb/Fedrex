<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - X-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f0f0f; 
            color: #fff; 
            overflow-x: hidden;
        }

        /* Effet de lueur en arrière-plan */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(15, 15, 15, 0) 70%);
            z-index: -1;
        }

        .glass { 
            background: rgba(26, 26, 26, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .input-group { position: relative; }
        
        .input-group i { 
            position: absolute; 
            left: 20px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #4b5563; 
            transition: color 0.3s;
        }

        .input-field {
            width: 100%; 
            background: #161616; 
            border: 1px solid #262626; 
            border-radius: 24px;
            padding: 20px 20px 20px 60px; 
            outline: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            color: white;
            font-size: 15px;
        }

        .input-field:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            background: #1a1a1a;
        }

        .input-field:focus + i {
            color: #3b82f6;
        }

        .loader { 
            display: none; 
            width: 22px; 
            height: 22px; 
            border: 3px solid rgba(255, 255, 255, 0.2); 
            border-radius: 50%; 
            border-top-color: #fff; 
            animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-loading .loader { display: block; }
        .btn-loading .btn-text { display: none; }
        
        .logo-text {
            background: linear-gradient(to right, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glow-bg"></div>

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-12">
            <div class="w-16 h-16 bg-blue-600 rounded-[2rem] flex items-center justify-center shadow-2xl shadow-blue-600/40 mb-4 rotate-3 hover:rotate-0 transition-transform duration-500">
                <i data-lucide="shield-check" class="text-white w-9 h-9"></i>
            </div>
            <h2 class="text-4xl font-black tracking-tighter logo-text italic">X-EXPRESS</h2>
            <div class="flex items-center gap-2 mt-2">
                <span class="h-[1px] w-8 bg-gray-800"></span>
                <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.3em]">Protocol Secure</p>
                <span class="h-[1px] w-8 bg-gray-800"></span>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="glass border-l-4 border-red-500 p-5 rounded-3xl mb-8 flex items-center gap-4 animate-in fade-in slide-in-from-top-4 duration-300">
                <div class="bg-red-500/20 p-2 rounded-xl">
                    <i data-lucide="octagon-alert" class="w-5 h-5 text-red-500"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-black text-gray-500">Erreur système</p>
                    <p class="text-sm font-bold text-white">{{ message }}</p>
                </div>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl">
            <h1 class="text-2xl font-black text-white mb-8 italic uppercase tracking-tight">Accès Compte</h1>

            <form id="authForm" action="/connexion" method="POST" class="space-y-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-4">Identifiant Mobile</label>
                    <div class="input-group">
                        <i data-lucide="smartphone" class="w-5 h-5"></i>
                        <input type="tel" name="phone" placeholder="Numéro de téléphone" required 
                               class="input-field font-bold placeholder:text-gray-700">
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center px-4">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Code Secret</label>
                        <a href="/mot-de-passe-oublie" class="text-[10px] text-blue-500 font-black uppercase hover:text-blue-400 transition-colors">Perdu ?</a>
                    </div>
                    <div class="input-group">
                        <i data-lucide="key-round" class="w-5 h-5"></i>
                        <input type="password" name="password" placeholder="••••••••" required 
                               class="input-field font-bold placeholder:text-gray-700">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[1.5rem] transition-all duration-300 shadow-lg shadow-blue-600/25 flex items-center justify-center gap-3 uppercase text-[11px] tracking-[0.2em] group">
                    <span class="btn-text">Vérification Identity</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 btn-text group-hover:translate-x-1 transition-transform"></i>
                    <div class="loader"></div>
                </button>
            </form>
        </div>

        <div class="text-center mt-10">
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">
                Pas encore de compte ?
                <a href="/inscription" class="text-blue-500 font-black hover:text-white transition-colors ml-2">Rejoindre X-Express</a>
            </p>
        </div>
    </div>

    <script>
        // Initialisation des icônes
        lucide.createIcons();

        // Gestion de l'état de chargement
        document.getElementById('authForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
