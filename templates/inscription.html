<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - PepsiBet</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #005cb4, #000b1d);
    color:#333;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 450px;
    background: #ffffff;
    padding: 35px 25px;
    border-radius: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: slideUp 0.6s ease-out;
    border-top: 6px solid #e32219;
}

.logo-area {
    text-align: center;
    margin-bottom: 20px;
}

.logo-area i {
    font-size: 40px;
    color: #005cb4;
}

h2 {
    text-align:center;
    margin-bottom: 25px;
    color: #002d72;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 22px;
}

label { display:block; margin-bottom:6px; font-weight:600; color:#002d72; font-size: 12px; text-transform: uppercase; }

input, select {
    width:100%;
    padding:14px 15px;
    margin-bottom:15px;
    border: 2px solid #f1f1f1;
    border-radius:12px;
    outline:none;
    transition: all 0.3s ease;
    background: #f8f9fa;
    font-size: 14px;
}

input:focus, select:focus {
    border-color:#005cb4;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,92,180,0.1);
}

/* OTP Styling */
.otp-container { display:flex; gap: 10px; margin-bottom: 15px; }
.otp-container input { flex:2; margin-bottom: 0; }
.otp-container button {
    flex:1;
    background:#005cb4;
    color:#fff;
    border:none;
    border-radius:12px;
    font-weight: 600;
    font-size: 13px;
    cursor:pointer;
    transition: 0.3s;
}

.submit-btn {
    width:100%;
    padding:16px;
    background:#e32219;
    color:#fff;
    border:none;
    border-radius:15px;
    font-size:15px;
    font-weight: 700;
    cursor:pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(227, 34, 25, 0.3);
    margin-top: 10px;
}

.submit-btn:hover { background:#c4120b; transform: translateY(-2px); }

.login-link { text-align:center; margin-top:20px; font-size:13px; color: #666; }
.login-link a { color:#005cb4; font-weight:700; text-decoration:none; }

@keyframes slideUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.flash-message {
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-size: 13px;
    text-align: center;
}
.flash-danger { background:#fff5f5; color:#c4120b; border: 1px solid #feb2b2; }
.flash-success { background:#f0fff4; color:#2f855a; border: 1px solid #9ae6b4; }
</style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <h2>PepsiBet</h2>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash-message {% if category == 'success' %}flash-success{% else %}flash-danger{% endif %}">
            {{ msg.message if msg is mapping else msg }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label><i class="fa-solid fa-earth-africa"></i> Pays de résidence</label>
        <select name="pays" required>
            <option value="">Choisir votre pays</option>
            <option value="Bénin">🇧🇯 Bénin</option>
            <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
            <option value="Cameroun">🇨🇲 Cameroun</option>
            <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
            <option value="Gabon">🇬🇦 Gabon</option>
            <option value="Guinée">🇬🇳 Guinée</option>
            <option value="Guinée-Bissau">🇬🇼 Guinée-Bissau</option>
            <option value="Mali">🇲🇱 Mali</option>
            <option value="Niger">🇳🇪 Niger</option>
            <option value="Sénégal">🇸🇳 Sénégal</option>
            <option value="Togo">🇹🇬 Togo</option>
        </select>

        <label><i class="fa-solid fa-phone"></i> Numéro Mobile Money</label>
        <input type="text" name="phone" placeholder="Ex: 0102030405" required>

        <label><i class="fa-solid fa-lock"></i> Mot de passe</label>
        <input type="password" name="password" placeholder="Créer un mot de passe" required>

        <label><i class="fa-solid fa-shield"></i> Confirmation</label>
        <input type="password" name="confirm_password" placeholder="Confirmer le mot de passe" required>

        <label><i class="fa-solid fa-user-plus"></i> Code d'invitation (Optionnel)</label>
        <input type="text" name="code_invitation" placeholder="Code parrain" value="{{ code_ref if code_ref }}">

        <label><i class="fa-solid fa-envelope-open-text"></i> Code OTP</label>
        <div class="otp-container">
            <input type="text" id="otp" name="otp" placeholder="Code à 4 chiffres" required>
            <button type="button" onclick="sendOTP()">OBTENIR</button>
        </div>

        <button type="submit" class="submit-btn">CRÉER MON COMPTE VIP</button>
    </form>

    <p class="login-link">
        Déjà un compte ? <a href="{{ url_for('connexion_page') }}">Se connecter ici</a>
    </p>

</div>

<script>
function sendOTP() {
    const btn = event.target;
    btn.innerText = "Envoi...";
    btn.disabled = true;

    fetch('/generate-otp')
    .then(response => response.json())
    .then(data => {
        document.getElementById('otp').value = data.otp;
        alert("PepsiBet Security : Votre code de validation est " + data.otp);
        btn.innerText = "Renvoyer";
        btn.disabled = false;
    })
    .catch(err => {
        console.error(err);
        btn.innerText = "Erreur";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
