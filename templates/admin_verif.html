<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin | Gestion des Vérifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050505; color: #eee; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black uppercase italic">Audit <span class="text-blue-500">Certifications</span></h1>
            <span class="bg-blue-600/20 text-blue-400 px-4 py-1 rounded-full text-xs font-bold">{{ demandes|length }} en attente</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            {% for d in demandes %}
            <div class="glass rounded-[2rem] p-6 space-y-4">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-black">Utilisateur</p>
                        <p class="font-bold text-blue-400">{{ d.user.phone }}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-black">Document</p>
                        <p class="text-xs font-bold">{{ d.type_doc }}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <p class="text-[9px] text-gray-600 uppercase">Face Recto</p>
                        <a href="/uploads/{{ d.photo_recto }}" target="_blank">
                            <img src="/uploads/{{ d.photo_recto }}" class="w-full h-32 object-cover rounded-xl border border-white/5 hover:border-blue-500 transition-all">
                        </a>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[9px] text-gray-600 uppercase">Face Verso</p>
                        <a href="/uploads/{{ d.photo_verso }}" target="_blank">
                            <img src="/uploads/{{ d.photo_verso }}" class="w-full h-32 object-cover rounded-xl border border-white/5 hover:border-blue-500 transition-all">
                        </a>
                    </div>
                </div>

                <div class="bg-white/2 p-4 rounded-2xl text-xs space-y-2 border border-white/5">
                    <p><span class="text-gray-500">Nom saisi :</span> <b>{{ d.nom_saisi }}</b></p>
                    <p><span class="text-gray-500">Prénoms :</span> <b>{{ d.prenom_saisi }}</b></p>
                    <p><span class="text-gray-500">Naissance :</span> <b>{{ d.dob }}</b></p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <a href="{{ url_for('traiter_demande', demande_id=d.id, action='approuver') }}" 
                       class="bg-green-600 text-white text-[10px] font-black uppercase py-4 rounded-xl text-center">Approuver</a>
                    
                    <button onclick="rejeterDemande({{ d.id }})" 
                       class="bg-red-600/10 border border-red-500/20 text-red-500 text-[10px] font-black uppercase py-4 rounded-xl">Rejeter</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        lucide.createIcons();
        function rejeterDemande(id) {
            const motif = prompt("Pourquoi rejeter cette demande ? (ex: Image floue, Nom différent)");
            if (motif && motif.trim() !== "") {
                window.location.href = `/admin/valider-demande/${id}/rejeter?motif=${encodeURIComponent(motif)}`;
            }
        }
    </script>
</body>
</html>
