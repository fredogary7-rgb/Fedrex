<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation - PepsiBet</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000b1d;
    color: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

/* CARD CONFIRMATION */
.confirm-card{
    background:#001a3d;
    border-radius:30px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    max-width:450px;
    width: 100%;
    border: 1px solid rgba(0, 86, 179, 0.3);
    position: relative;
}

.confirm-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:20px;
    border: 2px solid rgba(0, 212, 255, 0.2);
}

.badge-vip {
    position: absolute;
    top: 35px;
    right: 35px;
    background: #e32219;
    color: #fff;
    padding: 5px 15px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 12px;
    box-shadow: 0 4px 10px rgba(227, 34, 25, 0.4);
}

h2{
    font-size:22px;
    margin-bottom:15px;
    font-weight: 700;
    text-transform: uppercase;
}

.info-row{
    display: flex;
    justify-content: space-between;
    margin-bottom:12px;
    font-size:14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.label { color: #94a3b8; }
.value { font-weight: 600; color: #fff; }
.highlight { color: #00d4ff; font-weight: 700; }

.total-box{
    background: rgba(0, 212, 255, 0.1);
    padding:15px;
    border-radius:18px;
    margin:20px 0;
    text-align: center;
    border: 1px solid rgba(0, 212, 255, 0.2);
}

.total-label {
    display: block;
    font-size: 11px;
    color: #00d4ff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
}

.total-amount {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
}

/* BUTTONS */
.btn-group{
    display:flex;
    gap:12px;
    margin-top: 25px;
}

.btn{
    flex:1;
    padding:15px;
    border-radius:15px;
    text-align:center;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
    border:none;
    cursor:pointer;
    transition: 0.3s;
    text-transform: uppercase;
}

.btn-cancel{
    background: rgba(255,255,255,0.05);
    color: #94a3b8;
}

.btn-confirm{
    background: #e32219; /* Rouge Pepsi */
    color:#fff;
    box-shadow: 0 5px 20px rgba(227, 34, 25, 0.3);
}

.btn:active { transform: scale(0.96); }

/* NAVIGATION BAS SYNCHRO */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:50%;
    transform: translateX(-50%);
    width:100%;
    max-width:480px;
    background:#001a3d;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.bottom-nav a{
    text-decoration:none;
    color:#94a3b8;
    font-size:11px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.bottom-nav a.active{ color:#00d4ff; font-weight:700; }
.bottom-nav i{ margin-bottom:4px; font-size: 18px; }
</style>
</head>

<body>

<div class="confirm-card">
    <div class="badge-vip">PEPSI POWER</div>
    
    <img
        src="{{ url_for('static', filename='images/' + (p.image if p.image else 'p.jpg')) }}"
        alt="{{ p.nom }}"
    >

    <h2>{{ p.nom }}</h2>

    <div class="info-row">
        <span class="label">Prix d'acquisition</span>
        <span class="value">{{ "{:,.0f}".format(p.prix) }} XOF</span>
    </div>

    <div class="info-row">
        <span class="label">Gain Quotidien</span>
        <span class="highlight">+ {{ "{:,.0f}".format(p.revenu_journalier) }} XOF</span>
    </div>

    <div class="info-row">
        <span class="label">Cycle de production</span>
        <span class="value">60 jours</span>
    </div>

    <div class="total-box">
        <span class="total-label">Rentabilité Totale estimée</span>
        <span class="total-amount">
            {{ "{:,.0f}".format(p.revenu_journalier * 60) }} XOF
        </span>
    </div>

    <form method="POST" action="{{ url_for('valider_produit_rapide', vip_id=p.id) }}">
        <div class="btn-group">
            <a href="{{ url_for('dashboard_page') }}" class="btn btn-cancel">
                Retour
            </a>
            <button type="submit" class="btn btn-confirm">
                Activer la machine
            </button>
        </div>
    </form>
</div>

<div class="bottom-nav">
    <a href="/dashboard" class="active"><i class="fa-solid fa-gamepad"></i>Accueil</a>
    <a href="/produits_rapide"><i class="fa-solid fa-bolt"></i>Paris</a>
    <a href="/team"><i class="fa-solid fa-user-group"></i>Équipe</a>
    <a href="/profile"><i class="fa-solid fa-circle-user"></i>Moi</a>
</div>

</body>
</html>
