<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération - X-Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f0f0f; color: #fff; overflow: hidden; }
        .glow-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(15, 15, 15, 0) 70%); z-index: -1; }
        .glass { background: rgba(26, 26, 26, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #4b5563; }
        .input-field { width: 100%; background: #161616; border: 1px solid #262626; border-radius: 20px; padding: 14px 14px 14px 48px; outline: none; transition: all 0.3s; color: white; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .loader { display: none; width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.2); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-loading .loader { display: block; }
        .btn-loading .btn-text { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glow-bg"></div>
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-600/30 mb-4 mx-auto rotate-3">
                <i data-lucide="refresh-cw" class="text-white w-7 h-7"></i>
            </div>
            <h1 class="text-2xl font-black text-white italic uppercase italic tracking-tighter">Réinitialisation</h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mt-2">Audit de sécurité X-Express</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="glass border-l-4 border-blue-500 p-4 rounded-2xl mb-6 text-[11px] font-bold text-white flex items-center gap-3">
                <i data-lucide="info" class="w-4 h-4 text-blue-500"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="glass p-8 rounded-[2.5rem]">
            <form id="resetForm" action="/mot-de-passe-oublie" method="POST" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-2">Identifiant Mobile</label>
                    <div class="input-group">
                        <i data-lucide="smartphone" class="w-4 h-4"></i>
                        <input type="tel" name="phone" placeholder="90 00 00 00" required class="input-field font-bold text-xs">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-2">Nouveau Code Secret</label>
                    <div class="input-group">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                        <input type="password" name="password" placeholder="••••••••" required class="input-field font-bold text-xs">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-2">Confirmation</label>
                    <div class="input-group">
                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                        <input type="password" name="confirm_password" placeholder="••••••••" required class="input-field font-bold text-xs">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all flex items-center justify-center gap-3 uppercase text-[10px] tracking-[0.2em] mt-4">
                    <span class="btn-text">Demander le code de reset</span>
                    <div class="loader"></div>
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="/connexion" class="text-gray-500 text-[10px] font-bold uppercase hover:text-white transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-3 h-3"></i> Retour à la connexion
            </a>
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.getElementById('resetForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
