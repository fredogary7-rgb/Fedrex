<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer votre commande</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-black mb-8 flex items-center gap-3">
            <i data-lucide="shopping-cart" class="text-blue-500"></i> Finaliser l'achat
        </h1>

        <form action="/confirmer-achat-final" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-6 rounded-[2rem] space-y-4">
                <div class="rounded-2xl overflow-hidden h-48">
                    <img src="{{ url_for('static', filename='vlogs/' + produit.images.split(',')[0]) }}" class="w-full h-full object-cover">
                </div>
                <div>
                    <h2 class="text-xl font-bold">{{ produit.nom }}</h2>
                    <p class="text-gray-500 text-sm mt-2 line-clamp-3">{{ produit.description }}</p>
                </div>
                <div class="pt-4 border-t border-gray-800">
                    <p class="text-xs font-bold text-gray-500 uppercase">Prix à payer</p>
                    <p class="text-3xl font-black text-blue-500">{{ "{:,.0f}".format(produit.prix) }} <span class="text-sm">XOF</span></p>
                </div>
            </div>

            <div class="space-y-4">
                <input type="hidden" name="produit_id" value="{{ produit.id }}">
                <input type="hidden" name="methode" value="{{ methode }}">
                <input type="hidden" name="phone_paiement" value="{{ phone }}">

                <div class="glass p-6 rounded-[2rem] space-y-4">
                    <h3 class="text-sm font-black text-blue-500 uppercase tracking-widest">Vos Informations</h3>
                    
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Nom complet</label>
                        <input type="text" name="nom_payeur" required placeholder="Ex: Jean Koffi" class="w-full bg-black/50 border border-gray-800 rounded-xl p-3 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Adresse de livraison</label>
                        <textarea name="adresse_livraison" required placeholder="Quartier, Rue, Maison..." class="w-full bg-black/50 border border-gray-800 rounded-xl p-3 h-20 outline-none focus:border-blue-500 transition-all resize-none"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Email (Optionnel)</label>
                        <input type="email" name="email_payeur" placeholder="client@mail.com" class="w-full bg-black/50 border border-gray-800 rounded-xl p-3 outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="p-4 bg-blue-600/5 rounded-2xl border border-blue-600/20">
                        <div class="flex justify-between text-xs">
                            <span class="text-gray-500">Mode choisi :</span>
                            <span class="font-bold uppercase text-blue-400">{{ methode }}</span>
                        </div>
                        <div class="flex justify-between text-xs mt-1">
                            <span class="text-gray-500">Numéro de paiement :</span>
                            <span class="font-bold text-white">{{ phone }}</span>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-600/20 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="credit-card"></i>
                        PAYER {{ "{:,.0f}".format(produit.prix) }} XOF
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
