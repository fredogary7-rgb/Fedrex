<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - PepsiCo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    /* Dégradé cohérent avec l'inscription */
    background: radial-gradient(circle at top right, #005cb4, #002d72);
    color:#333;
}

.container {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    padding: 40px 30px;
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease-out;
    border-top: 8px solid #e32219; /* Ligne rouge Pepsi */
}

h2 { 
    text-align:center; 
    margin-bottom: 25px; 
    color: #002d72; 
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

label { display:block; margin-bottom:6px; font-weight:600; color:#002d72; font-size: 13px; }

input, select {
    width:100%;
    padding:14px 15px;
    margin-bottom:18px;
    border: 2px solid #eee;
    border-radius:12px;
    outline:none;
    transition: all 0.3s ease;
    background: #f8f9fa;
}

input:focus, select:focus { 
    border-color:#005cb4; 
    background: #fff;
    box-shadow: 0 0 0 4px rgba(0,92,180,0.1); 
}

.otp-container { display:flex; gap: 10px; margin-bottom: 18px; }
.otp-container input { flex:2; margin-bottom: 0; }
.otp-container button {
    flex:1;
    background:#005cb4;
    color:#fff;
    border:none;
    border-radius:12px;
    font-weight: 600;
    cursor:pointer;
    transition: 0.3s;
}
.otp-container button:hover { background:#002d72; }

button.submit-btn {
    width:100%; 
    padding:15px; 
    background:#e32219; 
    color:#fff; 
    border:none;
    border-radius:12px; 
    font-size:16px; 
    font-weight: 700;
    cursor:pointer; 
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(227, 34, 25, 0.3);
    text-transform: uppercase;
}

button.submit-btn:hover { 
    background:#c4120b; 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(227, 34, 25, 0.4);
}

p.register-link { text-align:center; margin-top:20px; font-size:14px; color: #666; }
p.register-link a { color:#005cb4; font-weight:700; text-decoration:none; }
p.register-link a:hover { text-decoration: underline; }

@keyframes fadeIn { from {opacity:0; transform: translateY(-20px);} to {opacity:1; transform: translateY(0);} }

.flash-message { 
    background:#fff5f5; 
    color:#c4120b; 
    padding:12px; 
    border-radius:12px; 
    margin-bottom:20px; 
    text-align:center; 
    border-left: 5px solid #e32219;
}
.flash-success { background:#f0fff4; color:#2f855a; border-left: 5px solid #48bb78; }
</style>
</head>
<body>
<div class="container">
    <h2>Connexion</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash-message {% if category == 'success' %}flash-success{% endif %}">
            {% if msg.title %}<strong>{{ msg.title }}</strong><br>{% endif %}
            {{ msg.message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label>Pays</label>
        <select name="pays" required>
            <option value="">Sélectionnez votre pays</option>
            <option value="Burkina Faso">Burkina Faso</option>
            <option value="Bénin">Bénin</option>
            <option value="Togo">Togo</option>
            <option value="Cameroun">Cameroun</option>
            <option value="Côte d'Ivoire">Côte d'Ivoire</option>
        </select>

        <label>Numéro de téléphone</label>
        <input type="text" name="phone" placeholder="Votre numéro" required>

        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <label>Code de vérification (OTP)</label>
        <div class="otp-container">
            <input type="text" id="otp" name="otp" placeholder="Code OTP">
            <button type="button" onclick="sendOTP()">Envoyer</button>
        </div>

        <button type="submit" class="submit-btn">Accéder à mon espace</button>
    </form>

    <p class="register-link">
        Nouveau chez PepsiCo ? <a href="{{ url_for('inscription_page') }}">Créer un compte</a>
    </p>
</div>

<script>
function sendOTP() {
    fetch('/generate-otp')
    .then(response => response.json())
    .then(data => {
        document.getElementById('otp').value = data.otp; 
        alert("Votre code de connexion PepsiCo : " + data.otp);
    })
    .catch(err => console.error(err));
}
</script>
</body>
</html>
