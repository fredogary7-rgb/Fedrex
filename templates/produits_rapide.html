<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits - Modern Threads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#121212] text-gray-100 font-sans">

    <div class="flex h-screen">
        <aside class="w-64 bg-[#1e1e1e] border-r border-gray-800 p-6 flex flex-col">
            <div class="flex items-center gap-2 mb-10">
                <i data-lucide="layers" class="text-blue-500"></i>
                <span class="text-xl font-bold tracking-tight">MODERN THREADS</span>
            </div>

            <nav class="space-y-4 flex-1">
                <a href="/dashboard" class="flex items-center gap-3 p-2 text-gray-400 hover:text-white"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="/produits" class="flex items-center gap-3 p-2 bg-blue-600 rounded-lg text-white font-medium"><i data-lucide="shopping-bag"></i> Produits</a>
                <a href="/commandes" class="flex items-center gap-3 p-2 text-gray-400 hover:text-white"><i data-lucide="shopping-cart"></i> Commandes</a>
                <a href="/parametres" class="flex items-center gap-3 p-2 text-gray-400 hover:text-white"><i data-lucide="settings"></i> Paramètres</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="mb-10 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold">Gestion des Produits</h1>
                    <p class="text-gray-400 mt-1">Ajoutez, modifiez ou supprimez les articles de votre catalogue.</p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <section class="lg:col-span-1">
                    <div class="bg-[#1e1e1e] rounded-2xl border border-gray-800 p-6 sticky top-8">
                        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="text-blue-500"></i> Nouveau Produit
                        </h2>
                        
                        <form action="/ajouter-produit" method="POST" class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Nom du produit</label>
                                <input type="text" name="nom" placeholder="ex: Chemise Slim Fit" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm text-gray-400 mb-2">Prix (€)</label>
                                    <input type="number" name="prix" step="0.01" placeholder="0.00" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-400 mb-2">Quantité</label>
                                    <input type="number" name="quantite" placeholder="Stock" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm text-gray-400 mb-2">Image (URL)</label>
                                <input type="text" name="image" placeholder="Lien de l'image" class="w-full bg-[#2a2a2a] border border-gray-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>

                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 transition-colors">
                                Ajouter au catalogue
                            </button>
                        </form>
                    </div>
                </section>

                <section class="lg:col-span-2">
                    <div class="bg-[#1e1e1e] rounded-2xl border border-gray-800 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-[#2a2a2a] text-gray-400 text-sm uppercase">
                                    <th class="p-4 font-medium">Produit</th>
                                    <th class="p-4 font-medium">Prix</th>
                                    <th class="p-4 font-medium">Stock</th>
                                    <th class="p-4 font-medium text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-800">
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="p-4 flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-lg bg-gray-700 overflow-hidden">
                                            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=100" class="w-full h-full object-cover">
                                        </div>
                                        <span class="font-medium">Veste en Cuir Premium</span>
                                    </td>
                                    <td class="p-4">129,00 €</td>
                                    <td class="p-4">
                                        <span class="bg-green-500/10 text-green-500 px-2 py-1 rounded-md text-xs font-bold">8 unités</span>
                                    </td>
                                    <td class="p-4 text-right">
                                        <div class="flex justify-end gap-2">
                                            <button title="Modifier" class="p-2 text-gray-400 hover:text-white"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                            <button title="Supprimer" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </td>
                                </tr>
                                <tr class="hover:bg-white/5 transition-colors">
                                    <td class="p-4 flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-lg bg-gray-700 overflow-hidden">
                                            <img src="https://images.unsplash.com/photo-1515347648492-b604bb9a5ca8?w=100" class="w-full h-full object-cover">
                                        </div>
                                        <span class="font-medium">Robe de Soirée Ébène</span>
                                    </td>
                                    <td class="p-4">85,00 €</td>
                                    <td class="p-4">
                                        <span class="bg-orange-500/10 text-orange-500 px-2 py-1 rounded-md text-xs font-bold">3 unités</span>
                                    </td>
                                    <td class="p-4 text-right">
                                        <div class="flex justify-end gap-2">
                                            <button title="Modifier" class="p-2 text-gray-400 hover:text-white"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                            <button title="Supprimer" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
