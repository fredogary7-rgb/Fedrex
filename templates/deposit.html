<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge - Coris Max</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    background:#f4f7ff;
}
.header{
    background:linear-gradient(135deg,#3a5cb8,#2ea78d);
    padding:30px 20px 70px;
    color:white;
    border-radius:0 0 40px 40px;
    text-align:center;
}
.header h2{
    font-size:20px;
    font-weight:600;
}
.container{
    padding:20px;
    max-width:480px;
    margin:-40px auto 0;
}
.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.05);
}
.card h3{
    text-align:center;
    margin-bottom:20px;
    font-size:16px;
}
.quick-amounts{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}
.quick-amounts button{
    border:1px solid #ddd;
    border-radius:50px;
    padding:10px;
    background:white;
    cursor:pointer;
    font-weight:500;
    color:#555;
    transition:0.2s;
    font-size:13px;
}
.quick-amounts button.selected,
.quick-amounts button:hover{
    border-color:#3a5cb8;
    color:#3a5cb8;
    background:#eef2ff;
}
.user-info input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
    outline:none;
}
.user-info input:focus{
    border-color:#3a5cb8;
}
#deposit-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#3a5cb8,#2ea78d);
    color:white;
    font-weight:600;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}
#deposit-btn:hover{
    opacity:0.9;
}
.loader{
    display:none;
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#3a5cb8;
}
</style>
</head>

<body>

<div class="header">
    <h2>💰 Déposer de l'argent</h2>
</div>

<div class="container">
    <div class="card">
        <h3>Recharger votre compte</h3>

        <div class="quick-amounts">
            <button type="button" onclick="setQuickAmount(event,4000)">4000</button>
            <button type="button" onclick="setQuickAmount(event,8000)">8000</button>
            <button type="button" onclick="setQuickAmount(event,10000)">10000</button>
            <button type="button" onclick="setQuickAmount(event,20000)">20000</button>
            <button type="button" onclick="setQuickAmount(event,50000)">50000</button>
            <button type="button" onclick="setQuickAmount(event,100000)">100000</button>
            <button type="button" onclick="setQuickAmount(event,200000)">200000</button>
            <button type="button" onclick="setQuickAmount(event,500000)">500000</button>
        </div>

        <div class="user-info">
            <input type="text" id="fullname" placeholder="Nom complet">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="phone" placeholder="Numéro téléphone">
            <input type="number" id="montant" placeholder="Montant minimum 3000">
        </div>

        <button id="deposit-btn" onclick="initDeposit()">Déposer maintenant</button>

        <div class="loader" id="loader">
            Ouverture du paiement sécurisé...
        </div>

    </div>
</div>

<script src="https://bkapay.com/bkapay-inline.js"></script>

<script>
function setQuickAmount(e, amount){
    document.querySelectorAll(".quick-amounts button")
        .forEach(btn=>btn.classList.remove("selected"));
    e.target.classList.add("selected");
    document.getElementById("montant").value = amount;
}

function initDeposit(){

    let fullname = document.getElementById("fullname").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let montant = parseInt(document.getElementById("montant").value);

    if(!fullname || !phone || !email || !montant || montant < 3000){
        alert("Veuillez remplir correctement les informations.");
        return;
    }

    document.getElementById("loader").style.display = "block";

    fetch("/create-deposit",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            montant: montant,
            email: email,
            fullname: fullname,
            phone: phone
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){

            BKApay.checkout({
                key:"pk_live_8948bec4-53e9-4c1a-8c4c-936928edfca4",
                amount: montant,
                orderId: data.depot_id,
                description:"Depot compte",

                customer:{
                    name: fullname,
                    phone: phone,
                    email: email
                },

                onSuccess:function(response){

                    fetch("/verify-bkapay",{
                        method:"POST",
                        headers:{
                            "Content-Type":"application/json"
                        },
                        body:JSON.stringify({
                            transactionId: response.transactionId,
                            depot_id: data.depot_id
                        })
                    })
                    .then(res=>res.json())
                    .then(result=>{
                        if(result.success){
                            alert("Paiement validé ✅");
                            window.location.href="/dashboard";
                        }else{
                            alert("Erreur vérification.");
                        }
                    });
                },

                onError:function(){
                    alert("Paiement échoué ❌");
                }
            });

        }else{
            alert("Erreur création dépôt");
            document.getElementById("loader").style.display = "none";
        }
    });
}
</script>

</body>
</html>
